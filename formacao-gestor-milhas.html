<html lang="pt-BR">

<title>Formação Gestor de Milhas</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f8fafc;color:#0f172a;font-family:'Inter',sans-serif;min-height:100vh;}
button{cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s;}
input,textarea{font-family:'Inter',sans-serif;}
input:focus,textarea:focus{outline:none;}
::-webkit-scrollbar{width:4px;}

.nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,0.97);backdrop-filter:blur(8px);border-bottom:1px solid #e2e8f0;padding:0 20px;}
.nav-inner{display:flex;align-items:center;justify-content:space-between;max-width:700px;margin:0 auto;padding:12px 0;}
.logo{display:flex;align-items:center;gap:8px;}
.logo-icon{width:32px;height:32px;border-radius:8px;background:#EEEDFE;display:flex;align-items:center;justify-content:center;font-size:17px;}
.logo-text{font-size:14px;font-weight:600;color:#0f172a;}
.logo-badge{font-size:10px;color:#534AB7;background:#EEEDFE;padding:2px 8px;border-radius:20px;}
.nav-btns{display:flex;gap:4px;align-items:center;}
.nav-btn{padding:7px 12px;border-radius:8px;font-size:11px;border:1px solid transparent;background:transparent;color:#64748b;}
.nav-btn.active{background:#EEEDFE;border-color:#534AB7;color:#534AB7;font-weight:500;}
.exit-btn{padding:7px 10px;background:none;border:none;color:#94a3b8;font-size:11px;}
.main{max-width:700px;margin:0 auto;padding:16px 20px 80px;}
.pill-tabs{display:flex;overflow-x:auto;gap:6px;padding-bottom:6px;margin-bottom:16px;scrollbar-width:none;}
.pill-tabs::-webkit-scrollbar{display:none;}
.pill{padding:6px 14px;border-radius:20px;font-size:11px;border:1px solid #e2e8f0;background:#fff;color:#64748b;white-space:nowrap;}
.pilar-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;margin-bottom:12px;}

.pilar-title{font-size:16px;font-weight:500;flex:1;}
.pilar-count{font-size:10px;padding:2px 10px;border-radius:20px;font-weight:500;}
.progress-bar{height:4px;background:#f1f5f9;}
.progress-fill{height:100%;transition:width 0.4s;}

.topico-title{flex:1;font-size:13px;font-weight:500;}
.topico-arrow{color:#94a3b8;font-size:16px;transition:transform 0.2s;line-height:1;}
.topico-body{padding:0 16px 14px 44px;display:none;}
.topico-body.open{display:block;}
.topico-desc{font-size:12px;color:#64748b;line-height:1.7;margin-bottom:8px;}
.item-line{font-size:11.5px;color:#475569;padding:3px 0 3px 10px;margin-bottom:3px;line-height:1.5;}
.admin-row{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}
.abtn{font-size:10px;padding:4px 10px;border-radius:6px;border:1px solid #e2e8f0;background:#f8fafc;color:#64748b;}

.add-topico:hover{background:#f8fafc;color:#64748b;}
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,0.5);z-index:999;display:flex;align-items:flex-end;}
.modal{background:#fff;width:100%;max-height:82vh;overflow-y:auto;border-radius:20px 20px 0 0;padding:24px;box-shadow:0 -4px 24px rgba(0,0,0,0.1);}
.modal-title{font-size:15px;font-weight:500;margin-bottom:16px;}
.field{margin-bottom:10px;}
.field label{font-size:11px;color:#64748b;display:block;margin-bottom:5px;}
.field input,.field textarea{width:100%;padding:9px 12px;background:#f8fafc;border:1px solid #cbd5e1;border-radius:8px;font-size:13px;color:#0f172a;}
.field textarea{min-height:90px;resize:vertical;}
.mfooter{display:flex;gap:8px;margin-top:14px;}
.btn-p{flex:1;padding:10px;background:#534AB7;border:none;color:#fff;border-radius:8px;font-size:13px;}
.btn-c{flex:1;padding:10px;background:#f8fafc;border:1px solid #e2e8f0;color:#64748b;border-radius:8px;font-size:13px;}
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{width:100%;max-width:340px;text-align:center;}
.l-icon{width:56px;height:56px;border-radius:16px;background:#EEEDFE;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:28px;}
.l-card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:24px;text-align:left;}
.l-input{width:100%;padding:12px 14px;background:#f8fafc;border:1px solid #cbd5e1;border-radius:8px;font-size:14px;margin-bottom:12px;}
.l-btn{width:100%;padding:12px;background:#534AB7;border:none;color:#fff;border-radius:8px;font-size:14px;font-weight:500;}
.l-err{font-size:12px;color:#A32D2D;margin-bottom:10px;display:none;}
.stag{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#94a3b8;margin-top:20px;margin-bottom:8px;}
.c-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.rrow{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:5px;}
.rbtn{font-size:11px;padding:5px 12px;background:#FAEEDA;border:1px solid #854F0B;color:#412402;border-radius:6px;}
.r-all{width:100%;padding:10px;background:#FCEBEB;border:1px solid #A32D2D;color:#501313;border-radius:8px;font-size:12px;margin-top:8px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:10px 20px;border-radius:20px;font-size:12px;z-index:9999;pointer-events:none;opacity:0;transition:opacity 0.3s;}
.toast.on{opacity:1;}
</style>
</head>

  ]},
  {id:'burocracia',nome:'Burocracias',icon:'📑',cor:'#444441',bg:'#F1EFE8',tc:'#2C2C2A',topicos:[
    {id:'t1',titulo:'Abertura de empresa',desc:'Estrutura jurídica recomendada para o gestor de milhas.',itens:['MEI não recomendado (limite R$81k/ano)','Recomendado: ME ou SLU','CNAE 6619-3/99 — atividades auxiliares de serviços financeiros','CNAE 7490-1/04 — intermediação e agenciamento','Conta PJ: Nubank PJ, Inter ou Itaú']},
    {id:'t2',titulo:'Contratos e segurança jurídica',desc:'Proteção legal mínima para o negócio.',itens:['Contrato de prestação de serviços (12 meses)','Cláusulas de confidencialidade (senhas e dados do cliente)','Política de cancelamento e reembolso clara','Prazo mínimo de 3 meses para gestão','Forma de pagamento e recorrência especificada']},
    {id:'t3',titulo:'Sistemas de cobrança automática',desc:'Como receber de forma recorrente e profissional.',itens:['Stripe: cobrança recorrente em cartão de crédito','Hotmart: recorrência + checkout otimizado','Iugu: boleto e cartão com recorrência','Mercado Pago: link de pagamento e recorrência','Lastlink: Travel e produtos digitais (comissão automática 50%)']},
    {id:'t4',titulo:'Operacional no Notion — módulo completo',desc:'Configuração completa do Notion como hub operacional.',itens:['Base de clientes com todas as informações','Quadro de demandas por cliente e status','Controle de pontuação, saldos e programas','Emissões com milhas e com agência (campos obrigatórios)','Transferência e compra de pontos (controle de CPM com bônus)','Monitoramento de interesse de viagens e Google Voos','Atualização de saldo: mensal, comparar Notion vs programa real']},
  ]},
  {id:'sucesso',nome:'Sucesso do Cliente',icon:'⭐',cor:'#3B6D11',bg:'#EAF3DE',tc:'#173404',topicos:[
    {id:'t1',titulo:'ROI rápido em 30 dias',desc:'Como gerar resultado concreto e visível no primeiro mês.',itens:['Primeira emissão com impacto visual (executiva com desconto)','Usar tabelas fixas LATAM Pass e TAP Miles&Go para resultado imediato','Mostrar economia em reais (não em milhas)','Enviar relatório visual de economia no 30° dia','Kit de boas-vindas + cartinha personalizada no onboarding']},
    {id:'t2',titulo:'Fluxo de sucesso 3 · 6 · 9 meses',desc:'O que fazer em cada marco do contrato para fidelizar e renovar.',itens:['3 meses: primeira emissão realizada · cliente engajado · solicitar indicação','6 meses: revisão de estratégia · upgrade de cartão · expansão do portfólio','9 meses: proposta de renovação · novo ciclo · avaliação de upgrade de plano','Relatório mensal de pontos (dias 1-5) + reunião de revisão trimestral','NPS e feedback: pesquisa de satisfação trimestral']},
    {id:'t3',titulo:'Mimo Hotel — encantamento na viagem',desc:'Como surpreender o cliente durante as viagens.',itens:['Ligar no hotel antes do check-in','Solicitar amenical + cartinha personalizada da empresa no quarto','Pedir mimo especial (champagne, flores, upgrade se disponível)','Roteiro de viagem surpresa personalizado por destino','Este gesto gera indicação espontânea e renovação automática']},
    {id:'t4',titulo:'Sistemas de recorrência e previsibilidade',desc:'Como garantir receita previsível todo mês.',itens:['Cobrança automática no cartão (Stripe / Iugu / Hotmart)','Relatório mensal enviado nos dias 1-5','Reunião de revisão trimestral obrigatória','Política de renovação: avisar 60 dias antes do vencimento','Previsibilidade: saber quantos clientes renovam por mês']},
  ]},
  {id:'conciliando',nome:'Conciliando Modelos',icon:'🔗',cor:'#534AB7',bg:'#EEEDFE',tc:'#26215C',topicos:[
    {id:'t1',titulo:'Agência + Gestão — sinergia',desc:'Como os dois modelos se complementam e se alimentam.',itens:['Cliente de agência vira cliente de gestão e vice-versa','Cliente de gestão gera receita adicional via agência (hotel, seguro, transfer, cruzeiro)','Mesmo WhatsApp para atendimento, abordagens distintas por produto','Separação de CNPJs: agência em um, gestão em outro','Ariel prospecta B2B · Luma e Ariel fazem gestão · Henrique opera agência']},
    {id:'t2',titulo:'Operacional Express',desc:'Fluxo simplificado para quem já tem agência.',itens:['Não duplicar processos — usar infraestrutura existente','Notion como hub central para as duas operações','Comunicação integrada mas abordagem distinta por produto','Separar financeiro por CNPJ desde o início','Meta de escala: Ariel prospecta, Luma gerencia, Henrique opera']},
    {id:'t3',titulo:'Notion como hub central',desc:'Como usar o Notion para unificar as duas operações.',itens:['Base de clientes unificada com tag por serviço (agência vs gestão)','Quadro de demandas compartilhado com filtros por produto','Controle financeiro separado por CNPJ','Relatórios mensais por cliente e por produto','Emissões separadas por fonte (milhas vs agência vs pacote)']},
  ]},
];

const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
const ld=(k,d)=>{try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch{return d;}};

let S={
  auth:false,
  tab:'p',
  pilares:ld('fgm_pilares',null)||JSON.parse(JSON.stringify(DEF)),
  prog:ld('fgm_prog',{}),
  sel:'comece',
  open:{},
  modal:null,
};

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2100);}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function render(){
  const r=document.getElementById('root');
  if(!S.auth){r.innerHTML=loginHTML();setTimeout(()=>document.getElementById('pw')?.focus(),50);return;}
  r.innerHTML=`
    <nav class="nav"><div class="nav-inner">
      <div class="logo"><div class="logo-icon">✈️</div><span class="logo-text">Formação Gestor de Milhas</span><span class="logo-badge">v1.0</span></div>
      <div class="nav-btns">
        <button class="nav-btn ${S.tab==='p'?'active':''}" onclick="go('p')">Pilares</button>
        <button class="nav-btn ${S.tab==='c'?'active':''}" onclick="go('c')">Config</button>
        <button class="exit-btn" onclick="sair()">Sair</button>
      </div>
    </div></nav>
    <div class="main">${S.tab==='p'?pilaresHTML():configHTML()}</div>
    ${S.modal?modalHTML():''}
  `;
}

function loginHTML(){return`
  <div class="login-screen"><div class="login-box">
    <div class="l-icon">✈️</div>
    <h1 style="font-size:20px;font-weight:600;margin-bottom:4px">Formação Gestor de Milhas</h1>
    <p style="font-size:13px;color:#64748b;margin-bottom:24px">Acesso restrito</p>
    <div class="l-card">
      <label style="font-size:11px;color:#64748b;display:block;margin-bottom:6px">Senha de acesso</label>
      <input class="l-input" type="password" id="pw" placeholder="Digite a senha..." onkeydown="if(event.key==='Enter')login()"/>
      <div class="l-err" id="lerr">Senha incorreta.</div>
      <button class="l-btn" onclick="login()">Entrar</button>
    </div>
  </div></div>
`;}

function pilaresHTML(){
  const p=S.pilares.find(x=>x.id===S.sel)||S.pilares[0];
  const done=p.topicos.filter(t=>S.prog[p.id+'_'+t.id]).length;
  const tot=p.topicos.length;
  const pct=tot?Math.round(done/tot*100):0;
  return`
    <div class="pill-tabs">${S.pilares.map(x=>`
      <button class="pill" style="${S.sel===x.id?`background:${x.bg};border-color:${x.cor};color:${x.tc};font-weight:500`:''}" onclick="sel('${x.id}')">${x.icon} ${x.nome}</button>
    `).join('')}</div>
    <div class="pilar-card">
      <div class="pilar-header">
        <span class="pilar-icon">${p.icon}</span>
        <span class="pilar-title">${p.nome}</span>
        <span class="pilar-count" style="background:${p.bg};color:${p.tc}">${done}/${tot} · ${pct}%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${p.cor}"></div></div>
      ${p.topicos.map((t,i)=>topicoHTML(p,t,i)).join('')}
      <button class="add-topico" onclick="openModal('add','${p.id}')">+ Adicionar tópico</button>
    </div>
  `;
}

function topicoHTML(p,t,i){
  const key=p.id+'_'+t.id;
  const done=!!S.prog[key];
  const open=!!S.open[key];
  return`
    <div class="topico">
      <div class="topico-header" onclick="toggle('${key}')">
        <div class="check ${done?'done':''}" onclick="event.stopPropagation();chk('${key}')">${done?'✓':''}</div>
        <span class="topico-title" style="${done?'text-decoration:line-through;color:#94a3b8':''}">${esc(t.titulo)}</span>
        <span class="topico-arrow" style="${open?'transform:rotate(90deg)':''}">›</span>
      </div>
      <div class="topico-body ${open?'open':''}">
        ${t.desc?`<p class="topico-desc">${esc(t.desc)}</p>`:''}
        ${(t.itens||[]).map(it=>`<div class="item-line" style="border-left:2px solid ${p.cor}44">${esc(it)}</div>`).join('')}
        <div class="admin-row">
          <button class="abtn" onclick="openModal('edit','${p.id}','${t.id}')">✏️ Editar</button>
          <button class="abtn" style="margin-left:auto" onclick="mover('${p.id}',${i},-1)">↑</button>
          <button class="abtn" onclick="mover('${p.id}',${i},1)">↓</button>
          <button class="abtn danger" onclick="del('${p.id}','${t.id}')">🗑</button>
        </div>
      </div>
    </div>
  `;
}

function configHTML(){return`
  <div style="padding-top:16px">
    <div class="stag">🔒 Trocar senha</div>
    <div class="c-card">
      <div class="field"><label>Senha atual</label><input type="password" id="op"/></div>
      <div class="field"><label>Nova senha</label><input type="password" id="np"/></div>
      <div class="field"><label>Confirmar</label><input type="password" id="cp"/></div>
      <div id="pwmsg" style="font-size:12px;margin-bottom:10px"></div>
      <button class="btn-p" onclick="trocaSenha()">Alterar senha</button>
    </div>
    <div class="stag">🔄 Restaurar dados</div>
    <div class="c-card">
      <p style="font-size:12px;color:#64748b;margin-bottom:12px;line-height:1.6">Restaura o conteúdo original sem apagar o progresso.</p>
      ${DEF.map(p=>`<div class="rrow"><span style="font-size:12px">${p.icon} ${p.nome}</span><button class="rbtn" onclick="rest('${p.id}')">Restaurar</button></div>`).join('')}
      <button class="r-all" onclick="rest('todos')">⚠️ Restaurar tudo de uma vez</button>
    </div>
    <div class="stag">ℹ️ Sobre</div>
    <div class="c-card">
      <div style="font-size:13px;font-weight:500;margin-bottom:4px">Formação Gestor de Milhas v1.0</div>
      <div style="font-size:11px;color:#64748b;line-height:1.8">@formacaogestordemilhas · 10 pilares · +40 módulos<br>Acesso protegido por senha · Dados salvos no dispositivo</div>
    </div>
  </div>
`;}

function modalHTML(){
  const m=S.modal;
  const p=S.pilares.find(x=>x.id===m.pid);
  const t=m.type==='edit'?p?.topicos.find(x=>x.id===m.tid):null;
  return`
    <div class="modal-bg" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">${m.type==='add'?'Novo tópico':'Editar tópico'}</div>
      <div class="field"><label>Título</label><input type="text" id="mt" value="${t?esc(t.titulo):''}"/></div>
      <div class="field"><label>Descrição</label><textarea id="md">${t?esc(t.desc||')':'}'}</textarea></div>
      <div class="field"><label>Itens (um por linha)</label><textarea id="mi">${t?(t.itens||[]).map(esc).join('\n'):''}</textarea></div>
      <div class="mfooter">
        <button class="btn-p" onclick="salvar()">Salvar</button>
        <button class="btn-c" onclick="closeModal()">Cancelar</button>
      </div>
    </div></div>
  `;
}

window.login=()=>{
  const pw=document.getElementById('pw')?.value;
  const cur=ld('fgm_pw','123456');
  if(pw===cur){S.auth=true;render();}
  else{const e=document.getElementById('lerr');if(e)e.style.display='block';}
};
window.sair=()=>{S.auth=false;render();};
window.go=(t)=>{S.tab=t;S.modal=null;render();};
window.sel=(id)=>{S.sel=id;S.open={};S.modal=null;render();};
window.toggle=(key)=>{S.open={...S.open,[key]:!S.open[key]};render();};
window.chk=(key)=>{S.prog={...S.prog,[key]:!S.prog[key]};sv('fgm_prog',S.prog);render();};
window.openModal=(type,pid,tid)=>{S.modal={type,pid,tid};render();};
window.closeModal=()=>{S.modal=null;render();};
window.mover=(pid,i,d)=>{
  S.pilares=S.pilares.map(p=>{
    if(p.id!==pid)return p;
    const ts=[...p.topicos];const ni=i+d;
    if(ni<0||ni>=ts.length)return p;
    [ts[i],ts[ni]]=[ts[ni],ts[i]];
    return{...p,topicos:ts};
  });
  sv('fgm_pilares',S.pilares);render();
};
window.del=(pid,tid)=>{
  if(!confirm('Excluir este tópico? Não é possível desfazer.'))return;
  S.pilares=S.pilares.map(p=>p.id!==pid?p:{...p,topicos:p.topicos.filter(t=>t.id!==tid)});
  sv('fgm_pilares',S.pilares);toast('🗑 Excluído');render();
};
window.salvar=()=>{
  const titulo=document.getElementById('mt')?.value?.trim();
  if(!titulo)return;
  const desc=document.getElementById('md')?.value?.trim()||'';
  const itens=(document.getElementById('mi')?.value||'').split('\n').map(s=>s.trim()).filter(Boolean);
  const m=S.modal;
  S.pilares=S.pilares.map(p=>{
    if(p.id!==m.pid)return p;
    const ts=m.type==='add'?[...p.topicos,{id:'t'+Date.now(),titulo,desc,itens}]:p.topicos.map(t=>t.id===m.tid?{...t,titulo,desc,itens}:t);
    return{...p,topicos:ts};
  });
  sv('fgm_pilares',S.pilares);S.modal=null;toast('✅ Salvo!');render();
};
window.rest=(id)=>{
  if(!confirm(id==='todos'?'Restaurar TODOS os pilares?':`Restaurar ${id}?`))return;
  if(id==='todos'){S.pilares=JSON.parse(JSON.stringify(DEF));}
  else{const orig=DEF.find(p=>p.id===id);if(!orig)return;S.pilares=S.pilares.map(p=>p.id===id?JSON.parse(JSON.stringify(orig)):p);}
  sv('fgm_pilares',S.pilares);toast('✅ Restaurado!');render();
};
window.trocaSenha=()=>{
  const o=document.getElementById('op')?.value,n=document.getElementById('np')?.value,c=document.getElementById('cp')?.value;
  const cur=ld('fgm_pw','123456');
  const msg=document.getElementById('pwmsg');
  if(o!==cur){msg.textContent='❌ Senha atual incorreta.';msg.style.color='#A32D2D';return;}
  if(n.length<4){msg.textContent='❌ Mínimo 4 caracteres.';msg.style.color='#A32D2D';return;}
  if(n!==c){msg.textContent='❌ Senhas não coincidem.';msg.style.color='#A32D2D';return;}
  sv('fgm_pw',n);msg.textContent='✅ Senha alterada!';msg.style.color='#1D9E75';
};

render();
</script>
</body>
</html>
