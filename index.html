.sw{position:relative;}
.si{width:100%;padding:7px 11px 7px 32px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;font-size:12px;color:var(--text);outline:none;transition:border-color .2s;}

.sbn2{flex:1;overflow-y:auto;padding:8px 8px;}

.tct{flex:1;font-size:13px;font-weight:500;line-height:1.4;}
.tca{color:var(--text3);font-size:18px;transition:transform .25s;flex-shrink:0;}

.tcb{display:none;padding:0 15px 14px 45px;border-top:1px solid var(--border);}
.tcb.open{display:block;}
.tcd{font-size:12px;color:var(--text2);line-height:1.75;margin:11px 0 9px;padding:9px 11px;background:var(--bg3);border-radius:7px;border-left:2px solid var(--accent);}
.tci2{display:flex;flex-direction:column;gap:3px;margin-top:7px;}
.tci{font-size:12px;color:var(--text2);line-height:1.65;padding:6px 9px;border-radius:6px;background:var(--bg3);border-left:2px solid var(--border2);transition:border-color .15s;}

.tcac{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap;}
.tac{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:11px;cursor:pointer;transition:all .15s;}

.mf2{margin-bottom:11px;}

.mbs{display:flex;gap:7px;margin-top:12px;}
.ms{flex:1;padding:10px;background:var(--accent);border:none;color:#fff;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}

.cs{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin:18px 0 7px;font-family:'JetBrains Mono',monospace;}
.cc2{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:15px;margin-bottom:9px;}
.cr{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;margin-bottom:4px;}

.reb{font-size:11px;padding:3px 11px;background:var(--bg2);border:1px solid var(--border2);color:var(--text2);border-radius:6px;cursor:pointer;}
.reb:hover{border-color:var(--accent-border);color:var(--accent2);}
.reab{width:100%;padding:9px;background:rgba(224,82,82,.08);border:1px solid rgba(224,82,82,.2);color:var(--red);border-radius:7px;font-size:12px;cursor:pointer;margin-top:9px;}
.cb{background:var(--bg3);padding:7px 11px;border-radius:7px;font-size:11px;color:var(--green);font-family:'JetBrains Mono',monospace;margin-top:7px;display:block;word-break:break-all;}
.ts2{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:9px 17px;border-radius:20px;font-size:12px;z-index:9999;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;}
.ts2.on{opacity:1;}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:40;}
.ov.on{display:block;}
@media(max-width:768px){
  .sb{position:fixed;left:0;top:0;z-index:50;transform:translateX(-100%);}
  .sb.open{transform:translateX(0);}
  .mb2{display:flex;}
  .tpw{display:none;}
  .ct{padding:14px 14px 70px;}
  .tb2{padding:11px 14px;}
  .tt{font-size:14px;}
  .phst{gap:9px;}
  .phsn{font-size:15px;}
}
</style>

em vende de quem não vende.","itens":["1. Conheça 100% o produto: benefícios, diferenciais, transformação mensurável e imensurável","2. Conheça 100% o público: dados demográficos, dores, dúvidas, desejos, objeções, concorrência","3. O bom vendedor não convence — apenas auxilia. Se precisar convencer, o lead não tem perfil","4. Trate o cliente como ele quer ser tratado: áudio / texto / ligação / call / direto ao ponto","5. O não faz parte do processo: se não for, agradeça. Todo não carrega um aprendizado"]},{"id":"co2","titulo":"4 Fases DASI — Venda Matadora","desc":"A estrutura completa de uma venda bem conduzida.","itens":["D — Diagnóstico/Qualificação: gastos no cartão, viagens/ano, interesses, extras","A — Aliança e Interesse: conecta o principal benefício com a realidade do lead","S — Sela o Valor: apresenta o serviço com entregáveis de forma sistemática. Oferta com urgência de 24h","I — Enseura com Confiança: fecha sem perguntar se vai fechar — conduza como se já fosse","5 Níveis do cliente: 1=não entende nada / 2=acumula pouco / 3=já emitiu / 4=faz transferência / 5=perde dinheiro sem estratégia"]},{"id":"co3","titulo":"10 Coisas que Fazem Perder a Venda","desc":"Erros que matam o fechamento antes de começar.","itens":["1. Não conhecer o produto — gera insegurança e perde autoridade","2. Não conhecer o público — fala com quem não tem perfil","3. Não saber o real benefício que interessa ao cliente","4. Focar demais na parte técnica ou nas milhas","5. Usar linguagem informal ou sem posicionamento premium","6. Não dominar as objeções mais comuns","7. Aceitar leads desqualificados só pra fechar algo","8. Tentar vender consultoria antes da hora","9. Não seguir os passos da venda — atende sem condução","10. Falar demais e perguntar de menos"]},{"id":"co4","titulo":"Scripts — Prospecção Fria Instagram (5 msgs)","desc":"Sequência completa de abordagem para leads frios.","itens":["MSG 1: identificação + entregáveis diretos + 'faz sentido entender melhor?'","MSG 2: detalhes do serviço + 'quanto você gasta por mês no cartão?'","MSG 3: benefícios reais listados + 'quais chamaram mais atenção?'","MSG 4: projeção personalizada com dados do lead + 'de 0 a 10 faz sentido?'","MSG 5 (garantia): 'se não economizar o valor investido em 12 meses, reembolso 100%'","Nunca adoeça mandando mil mensagens pro mesmo lead — insista nos que deram ok"]},{"id":"co5","titulo":"Scripts — Call de Vendas 3 Etapas","desc":"Como conduzir a reunião de fechamento.","itens":["ETAPA 1 — Qualificação: gastos, viagens, dores atuais, como resolve hoje","ETAPA 2 — Apresentação: serviço como solução para as dores. Listar transformações, não recursos","ETAPA 3 — Pitch: oferta com urgência de 24h. 'De 0 a 10 faz sentido? Acima de 7 fecha, abaixo trata objeção'","Dica: nunca pergunte se vai fechar — conduza como se já fosse e veja o que surge"]},{"id":"co6","titulo":"Scripts — Social Selling Instagram","desc":"Abordagem por tipo de interação no perfil.","itens":["Voto enquete: 'Fala João, vi que votou X, me conta: [pergunta de qualificação]'","View em Stories: 'vi que acompanhou meu story sobre [tema], me conta o que você acha'","Comentário/Curtida: 'vi que comentou no meu post sobre X, como posso te ajudar?'","Novo seguidor: 'como está seu planejamento de viagens para os próximos 12 meses?'","Dica: vídeo personalizado de 20s para leads mega qualificados — impacto muito maior","Fluxo diário: 1) conversas abertas → 2) post/feed → 3) stories → 4) novos seguidores"]},{"id":"co7","titulo":"Scripts — Recuperar Lead Parado","desc":"Técnicas para reativar contatos que pararam de responder.","itens":["Áudio Fake: grave 30s em branco → envie com mensagem 'Obs: essa condição é a melhor...' → ele vai reagir e reabrir","Follow Up suave: 'Imagino sua agenda corrida, quando tiver 2 minutos me avisa'","Personalização: 'me lembrei de você — como está seu planejamento para os próximos 12 meses?'","Presente: roteiro de viagem por IA para o destino de interesse do lead","Cartada final: agradecimento sincero + fechamento da tentativa de contato"]},{"id":"co8","titulo":"Scripts — Travel, Parceiros, Influencer","desc":"Abordagens para outros canais de venda.","itens":["Travel (downgrade): 'IA 24h + alertas por região/executiva/oportunidade. 12x R$29,70/mês'","Parceiros: cabeleiro, barbeiro, contador, advogado premium — indicação recíproca","Influencer Story 1: 'Pessoal, quero indicar alguém de confiança para cuidar das suas milhas...'","Influencer Story 2: agradecimento aos amigos que já fecharam + curiosidade de resultado","Influencer Story 3: fechamento com CTA direto + @username"]},{"id":"co9","titulo":"O que Fazer Quando — 12 Objeções Mapeadas","desc":"Script completo para cada objeção com objetivo.","itens":["Vai falar com marido/esposa: 'se dependesse só de você, já estaria fechado?' → agenda call a dois","Vai pensar e depois responde: valide + projeção + oferta exclusiva → 'o que te impede agora?'","Achou caro: âncora de valor + ROI comprovado + garantia","Quer comparar com agência: mostre os 10 diferenciadores","Some após parecer interessado: Áudio Fake + mensagem personalizada","Já usa milhas, não precisa: 'então você já sabe o valor. A gestão multiplica o que você já faz'","Não tem tempo agora: 'é exatamente por falta de tempo que faz sentido terceirizar'","Quer ver exemplos: 1-2 cases do mesmo perfil + prints reais","Vai acumular mais primeiro: custo de oportunidade mensal","Graça ou valor menor: downgrade para consultoria ou travel","Não aceita forma de pagamento: Mercado Pago / Pix parcelado","Desconfia da operação: prova social + garantia contratual"]},{"id":"co10","titulo":"Transformando 1 Cliente em Outro","desc":"Sistema completo de indicações recorrentes.","itens":["3 momentos certos para pedir: onboarding (Diamante), primeira emissão realizada, renovação","Script pós-emissão: 'Quem você indicaria que tem o mesmo perfil que você?'","Como pedir em 12 meses: mês 1 (Diamante), mês 3 (primeira entrega), mês 6, mês 9","Meta: 1 indicação a cada 3 meses por cliente = 4/ano por cliente ativo","Fluxo após indicação: contato em 24h com nome do indicador → abordagem personalizada"]},{"id":"co11","titulo":"Gestão de Milhas Diamante — produto extra","desc":"Upgrade que gera indicações diretas no onboarding.","itens":["O que é: plano extra apresentado no onboarding para captar 5 indicações imediatas","Itens: suporte jurídico 24h + atendimento prioritário + grupo executiva + R$1.500 cashback por indicação + roteiros ilimitados por IA","Preço: 12x R$197 ou R$1.997 à vista","Script: 'Para esse plano, preciso que me indique 5 contatos da sua rede com gasto significativo no cartão e gosto de viajar. Quem são os 5 primeiros nomes que vêm na sua cabeça?'"]},{"id":"co12","titulo":"Prospecção Fria — Onde Encontrar Leads","desc":"10 perfis de alto valor e como localizá-los.","itens":["1. Médicos/dentistas premium — @dr. / @clinicadr / congressos e viagens de descanso","2. Empresários de franquias de luxo — estéticas, odontologia, óticas premium","3. Corretoras de imóveis alto padrão — @luxuryrealestate / @imoveisdeluxo","4. Donos de e-commerces e marcas de moda própria — hashtags #modapremium","5. Advogados autônomos ou bancas boutique — lifestyle premium + escritório próprio","6. Investidores e consultores financeiros — seguidores de @ricardocapra / @flaviogustavo","7. Academias boutique e studios de luxo — Las Cinq, Velocity, Bodytech Premium","8. Restaurantes e clubes de vinho sofisticados — @jacano @bruella","9. Passageiros frequentes de executiva — comentadores em perfis como @passageirodeprimeira","10. Frequentadores de LIDE / Gramado Summit / imersões — tags e localização dos eventos"]},{"id":"co13","titulo":"Prospecção Fria — Planejamento Mensal","desc":"Volume diário e projeções de fechamento por fase.","itens":["0-30 dias: 30/dia → 780/mês → 78-117 respostas → 4-8 fechamentos","30-60 dias: 60/dia → 1.560/mês → 16-23 leads interessados","60-90 dias: 80/dia → 2.080/mês → 21-31 leads interessados","Acima de 90 dias: 100/dia → 2.600/mês","Regras: variar mensagem a cada 15-20 envios / intervalo mínimo 10min / bloqueio = pause 24-48h","Organização no Instagram: label 'Lead' ao primeiro ok / label 'Agendado' ao mostrar interesse"]}]},{"id":"marketing","nome":"Marketing","icon":"📱","cor":"#f97316","topicos":[{"id":"mk1","titulo":"Destruidor de Negócios — 4 autoavaliações","desc":"O que sabota silenciosamente o negócio do gestor.","itens":["1. Você conhece o que está vendendo? Teste: você compraria um produto de R$5M numa loja na periferia?","2. Você é a prova viva do que vende? Verifica postura, linguagem, estilo de vida","3. Qual impressão sua vitrine passa? Instagram e presença presencial comunicam o mesmo?","4. O que você considera como marketing? Básico = gerar demanda qualificada / Avançado = quanto mais marketing, menos força para vender"]},{"id":"mk2","titulo":"Instagram — 8 Regras de Posicionamento","desc":"O que nunca fazer no perfil de gestor.","itens":["1. Você não ensina nada — você é empresário, não professor","2. Você não é vendedor de curso","3. Você não é para todo mundo — quem não tiver perfil, não deve ficar","4. Seu Instagram é uma vitrine — gera curiosidade para voltar amanhã","5. Sem constância nada acontece","6. O visual vende — Canva, fotos de Android e falta de padrão destroem a percepção","7. Quanto menor o perfil, maior a necessidade de harmonização visual","8. Você não é influencer — você é empresário"]},{"id":"mk3","titulo":"Instagram — Do Zero em 7 Dias","desc":"Estrutura completa do perfil vendedor.","itens":["FOTO: Cara de Pix — profissional, confiança, tom premium","BIO L1: transformação que você gera + para quem","BIO L2: prova de autoridade (ex: 3.000 viagens / 5 milhões de milhas gerenciadas)","BIO L3: CTA direto (ex: 'Saiba como aqui')","Link na Bio: api.chatpro.com.br/gerador-de-links ou wa.me/55119...","Destaques: Pitch do serviço / Dúvidas frequentes / Viagens / Estilo de vida","3 Posts fixados: pitch / você / prova social","6 Posts iniciais: 2 UAU NÃO SABIA / 2 Social proof / 1 Família / 1 Quebra de objeção","Teste Cara de Pix com ChatGPT: 'analise meu Instagram e note 0-10 para quanto parece bater com público rico'"]},{"id":"mk4","titulo":"Produção de Conteúdo Feed — 5 Estruturas","desc":"Como montar cada tipo de Reel com objetivo claro.","itens":["1. FRASE QUE PARA O FEED: curta, provocadora, incômoda. Evite frases explicativas ou belas","2. DESCRIÇÃO DO CENÁRIO: mostre o custo oculto do problema. Liste erros, atrasos, frustrações. Cirúrgico","3. VISÃO DO FUTURO: descreva como seria a vida com sua solução. Sentimento + praticidade","4. ESTRUTURA DO SERVIÇO: divida em 3 etapas. Não ensine o processo — mostre que você tem método","5. CTA: firme, elegante, direto. Não peça curtida. Posicione como convite profissional","Frequência: Iniciante 2-3x/sem / Intermediário 4-5x/sem / Avançado 7x/sem","Proporção: 70% conhecimento / 30% venda"]},{"id":"mk5","titulo":"Produção de Conteúdo Stories — 15 Tipos Novela","desc":"Conteúdo que constrói autoridade diariamente.","itens":["1. Rotina executiva com estilo — operação + elementos de luxo","2. Relógios de luxo e o tempo — empresários perdem tempo com viagem mal gerida","3. Hotéis de alto padrão — sua visão especializada","4. Destinos menos óbvios para quem já foi à Europa e EUA","5. Jantares e restaurantes VIP — cuida da experiência além do voo","6. Classe executiva vs econômica — compare companhias, assentos","7. Pequenos luxos que mudam o dia — transporte, carro, detalhes","8. Bastidores de atendimento premium — prova social sem exposição direta","9. Insights sobre lifestyle executivo — frases curtas sobre escolhas","10. Erros caros de quem economiza onde não deve","11. Como você antecipa imprevistos em viagens internacionais","12. Experiência para manter imagem profissional do cliente","13. Estética e ambiente dos bastidores — organização, elegância","14. Viagem como extensão da estratégia do negócio","15. Cenas cotidianas com reflexão: 'tem Porsche na garagem mas ainda organiza a própria viagem'"]},{"id":"mk6","titulo":"Stories de Venda — 3 Roteiros Prontos","desc":"Sequências completas para vender o serviço.","itens":["IDEIA 1: 'Se você tem mais dinheiro que tempo' → Story 1: problema / 2: quem tem equipe / 3: executiva confirmada / CTA enquete","IDEIA 2: 'Mesmo rota, classes diferentes' → Story 1: lado a lado / 2: um pagou caro, outro economizou 49% / 3: só um tem gestão","IDEIA 3: 'Sua secretária vs. nosso time' → Story 1: pedido de remarcação / 2: secretária diz vou ver com a agência / 3: nosso cliente tem equipe","Técnica: loops de 5 stories com começo, meio e fim. Nunca story solto"]},{"id":"mk7","titulo":"Networking Ativo — 10 atitudes + 5 estratégias","desc":"Como construir rede de alto perfil de forma intencional.","itens":["10 atitudes: interesse genuíno / usar o nome / ouvir mais / sorrir / terreno comum / evitar discussões / despertar desejo / falar sobre interesses do outro / elogio sincero / encontrar ponto em comum","6 erros: falar mais que ouvir / sem objetivo / vender sempre / sem identificação pessoal / esquecer contatos / ser o chatão","5 estratégias: ser referência no grupo / eventos = conteúdo direto elegante / acessar contatos próximos do famoso / Serve-Serve-Serve / intencionalidade muda tudo","Onde: eventos/imersões / hotéis e restaurantes de luxo / sendo cliente de serviços premium / academias caras"]},{"id":"mk8","titulo":"6 Formas de Gerar Lead Qualificado","desc":"Do orgânico ao pago com dados reais.","itens":["1. Conteúdo Orgânico: 10 temas polêmicos + 10 de descoberta. Plataforma: answerthepublic.com","2. Impulsionamento: após 15 posts / mínimo R$70/dia / segmentação: gênero + acima de 25 anos","3. Parcerias: Básico (cabeleiro/barbeiro/contador) → Semi (influencers de nicho) → Avançado (celebridades de milhas)","4. Influenciadores: calcular ROI = 1.000 views qualificados × 5% follow × 10% close","5. Patrocínio em eventos: 20% qualificados do total. Leve stand visual + colete número presencialmente","6. Mídia Regional e Panfletagem: R$150-200/dia por panfleteiro / 300 panfletos/dia"]}]},{"id":"operacional","nome":"Operacional","icon":"⚙️","cor":"#10b981","topicos":[{"id":"op1","titulo":"Pré-Call — 5 etapas no CRM","desc":"Tudo que deve acontecer antes da call de onboarding.","itens":["1. Cliente compra → enviar formulário (link público no Notion)","2. Conferir respostas: dados corretos? Alterar no Notion. CRM: Montar Estratégia","3. Montar estratégia: interesses de viagem + programas + projeção + gestão diamante + horário","4. Criar apresentação no legacy10x10.com.br/formacao → CRM: Aguardar Call","5. Enviar link de agendamento → CRM: Aguardando Call","Erros críticos: formulário incompleto / cliente demorar para agendar (cobrar ativamente)"]},{"id":"op2","titulo":"Call de Onboarding — Técnica + Prática","desc":"O que cobrir em cada parte da call.","itens":["TÉCNICA: o que faremos, alinhamento de expectativas, ROI, como acumular milhas, fases, formas de pagamento","PRÁTICA: logins e senhas de todos os programas, interesses de viagem, consultoria de cartão, projeção mensal e anual","Fórmula acúmulo: Mensal = Gasto × 0,3636 | Anual = Gasto × 4,3636","Erros: chegar sem logins prontos / criar expectativas erradas sobre resultados"]},{"id":"op3","titulo":"Pós-Call — 9 etapas obrigatórias","desc":"Tudo que deve ser feito imediatamente após a call.","itens":["1. Enviar PDF da call para o cliente","2. Confirmar senhas e pontuações em cada programa","3. Verificar pontuação atual e registrar no Notion","4. Adicionar pontos a expirar com datas","5. Adicionar Clube caso tenha","6. Cadastrar Interesses de Viagem completos","7. Lançar senhas no 1Password","8. Preencher cartão solicitado + prazo de solicitação no CRM","9. Cobrar indicações (Diamante)"]},{"id":"op4","titulo":"Rotina Diária Fixa — 9 ações","desc":"Executar em horários fixos todo dia.","itens":["1. CRM: verificar clientes em cada fase do funil","2. Demandas: Manual / Via Formulário / A partir de Ação — separar os 3 tipos","3. Promoções Direcionadas: antes de 12h. Grupo Israel + alertas personalizados","4. Check-In: 48h antes do voo. Manhã e noite","5. Pontos a Expirar: 1x ao dia","6. Aniversário: mensagem no dia. Sexta: checar fim de semana","7. Mimo Hotel: ligar + solicitar mimo + cartinha personalizada","8. Sucesso do Cliente: NPS trimestral","9. Resumo de Oportunidades: enviar na comunidade do Milho"]},{"id":"op5","titulo":"Rotina Esporádica — ações por demanda","desc":"O que fazer conforme aparecer.","itens":["Cotações: filtros obrigatórios → origem/destino/pax/data/horário/conexão/bagagem/cabine/urgência A-B-C","Emissões: confirmar nome+destinos antes de emitir → salvar no Notion → ofertar hotel/seguro/transfer","Hotel: cidade/nome/pax/noites/datas/orçamento/localização/hotel específico?","Seguro viagem: data ida/volta + pax + faixa etária → cotar e encaminhar","Compra Bonificada: NUNCA faça pelo cliente — instrua no onboarding como ele mesmo faz"]},{"id":"op6","titulo":"Transferência e CPM — controle correto","desc":"Como calcular e lançar sem distorcer o custo por milheiro.","itens":["CPM = Custo total ÷ Milhas totais recebidas (incluindo bônus)","Exemplo: 100k Livelo → Smiles com 100% bônus. Custo R$3.000 → 200k Smiles → CPM = R$15/milheiro","NUNCA lançar bônus com custo zero — distorce o CPM real","Quando transferir: viagem definida + saldo insuficiente + cliente com flexibilidade","Quando NÃO transferir: sem viagem definida / CPM alto / promoção inapropriada"]},{"id":"op7","titulo":"Formulário de Cotação — campos obrigatórios","desc":"Nunca cotar sem ter TODOS esses dados.","itens":["PASSAGEM: origem + destino / qtd passageiros e idades / data ida + data volta / pode conectar? / bagagens? / executiva ou econômica? / urgência A-B-C","HOTEL: cidade / nome / qtd pax / noites / datas / orçamento / localização / hotel específico?","SEGURO: datas + qtd passageiros + faixa etária de cada um","Sempre perguntar após emissão: hotel? seguro? transfer? aluguel de carro?"]},{"id":"op8","titulo":"Gestão de Milhas Diamante — entrega diária","desc":"Como entregar os benefícios do produto premium.","itens":["Suporte jurídico 24h: advogado parceiro disponível no grupo","Atendimento prioritário: resposta em até 2h em horário comercial","Grupo de promoções de executiva: adicionar no onboarding imediatamente","R$1.500 cashback por indicação: registrar no Notion + pagar ao confirmar","Roteiro por IA: gerar via ChatGPT com perfil do cliente antes da viagem"]}]},{"id":"opexpress","nome":"Operacional Express","icon":"🚀","cor":"#06b6d4","topicos":[{"id":"oe1","titulo":"Notion — Hub Central de Operação","desc":"Estrutura completa do CRM e base de clientes.","itens":["CRM com 9 fases: Formulário Preenchido → Montar Estratégia → Criar Canva → Agendar Call → Aguardando Call → Subir Detalhes → Acompanhar Solicitação → Refazer Estratégia → Concluído","Base de clientes: nome, cartões, pontos, programas, interesses de viagem, datas de expiração","Demandas: título + tipo + cliente + responsável + status + urgência","Emissões com milhas: IATA origem/destino, datas, classe, localizador, companhia, programa, pontos, taxas"]},{"id":"oe2","titulo":"Pré-Call Express — passo a passo no Notion","desc":"Fluxo detalhado de cada etapa no sistema.","itens":["FORMULÁRIO: Formulários → Novo Formulário → Copiar Link → Enviar ao cliente","CONFERÊNCIA: Formulários → Abrir cliente → Conferir → Editar se necessário → CRM: Montar Estratégia","MONTAGEM: analisar interesses de viagem + programas + projeção + estratégia diamante","APRESENTAÇÃO: acessar legacy10x10.com.br/formacao → criar → CRM: Aguardar Call"]},{"id":"oe3","titulo":"Call Express — durante e após no Notion","desc":"O que fazer durante e logo após a reunião.","itens":["DURANTE: CRM → alterar para 'Saber Cliente' → abrir Interesses de Viagem → preencher campos → Adicionar Saldo","PÓS: preencher interesses completos → 1Password para senhas → lançar pontos + datas → criar demanda do cartão"]},{"id":"oe4","titulo":"Cartão Indicado — critérios de escolha","desc":"Como escolher o melhor cartão para cada perfil.","itens":["1. Prioridade: upgrade no banco que o cliente já tem relacionamento","2. Sem relacionamento: acima de R$20k → black / acima de R$50k → 2,5 pontos/dólar","3. Comprovação de renda fácil: Santander, Bradesco","4. Azul Visa Infinita: casais que viajam juntos + gastam acima de R$20k/mês","5. Nunca prometa aprovação — busque sempre o mais fácil primeiro"]},{"id":"oe5","titulo":"FAQ Transferência e CPM","desc":"Respostas para as dúvidas mais comuns.","itens":["Q: Como calcular CPM? A: Custo total ÷ milhas totais recebidas. Ex: R$3k ÷ 200k = R$15/milheiro","Q: Quantas milhas com 100% bônus? A: 100k base + 100k bônus = 200k milhas","Q: Bônus têm custo? A: SIM. R$1.500 pros 100k base + R$1.500 pros 100k bônus","Q: Posso lançar bônus com custo zero? A: NUNCA. Distorce o CPM real"]},{"id":"oe6","titulo":"Tarefas Obrigatórias Diárias","desc":"Checklist do que fazer todos os dias no Notion.","itens":["Analisar grupos e verificar pendências dos clientes","Fazer check-in — 3 horários diferentes (manhã, tarde, noite)","Verificar pontos creditados nos programas","Verificar CRM e realizar ações pendentes","Enviar resumo de cliente beneficiado na comunidade","Pegar demandas do WhatsApp e subir para o Notion"]}]},{"id":"produto","nome":"Produto · Público · Preço","icon":"🎯","cor":"#d4a84b","topicos":[{"id":"pp1","titulo":"Os 3 Produtos do Portfólio","desc":"Quando usar cada produto e como posicionar.","itens":["GESTÃO DE MILHAS: 12 meses / tudo pelo cliente / 1 call de onboarding / R$2k a R$9k/ano conforme perfil","CONSULTORIA Tipo 1: 1 call + 30 dias suporte / R$500-3k — porta de entrada para gestão","CONSULTORIA Tipo 2: 2 calls + 90 dias suporte / R$750-3k — para perfis mais complexos","TRAVEL (ALERTAS): R$297/ano ou R$29,70/mês / IA 24h + grupos segmentados / 50% comissão afiliados","Regra: consultoria e travel são portas de entrada — quem entende o valor vai para gestão"]},{"id":"pp2","titulo":"Persona — Perfil Ideal do Cliente","desc":"Quem é o cliente de gestão de milhas.","itens":["Idade: 30 a 50 anos","Profissões: Empreendedor, CEO, Médico, Advogado, Dentista premium, Infoprodutor, Franqueado","Gasto mínimo: R$20-30k/mês no cartão","Viagens: mínimo 4x/ano (nacional + internacional)","Dores: falta de tempo, gasto excessivo, desorganização, frustração com passagens caras","Qualificador: 'de 0 a 10 quanto você delega hoje na sua vida?' — quem delega está pronto"]},{"id":"pp3","titulo":"Tabela de Preços por Perfil","desc":"Quanto cobrar conforme o volume do cliente.","itens":["R$20k gastos/mês + 4 viagens/ano → R$2.000/ano","R$28k gastos/mês + 4 viagens/ano → R$3.000/ano","R$40k gastos/mês + 5 viagens/ano → R$5.000/ano","R$80k gastos/mês + 5 viagens/ano → R$7.000/ano","R$120k gastos/mês + 6 viagens/ano → R$9.000/ano","Mínimo para alunos da formação: R$3.000/ano","Cobrança sempre em recorrência automática (Stripe / Iugu / Hotmart)"]},{"id":"pp4","titulo":"Qualificação e Triagem","desc":"Como separar quem vai para qual produto.","itens":["GESTÃO: gasta 20k+ no cartão / viaja 4x+/ano / quer delegar tudo","CONSULTORIA: quer aprender pontualmente / viaja 1-2x/ano","TRAVEL: rejeitou gestão e consultoria / quer alertas / ticket baixo","Nunca ofereça gestão para quem não tem perfil — gera frustração nos dois lados"]}]},{"id":"caixa","nome":"Caixa Rápido 30D","icon":"⚡","cor":"#ef4444","topicos":[{"id":"cx1","titulo":"Como Fazer R$25k em 30 Dias","desc":"4 estratégias para primeiros resultados com 5 clientes.","itens":["ESTRATÉGIA 1: prospecção ativa na base existente — ex-clientes da agência, família, amigos próximos","ESTRATÉGIA 2: consultoria com urgência — 'estou abrindo X vagas essa semana'","ESTRATÉGIA 3: parceria com agências de viagem — 20-30% de comissão por indicação","ESTRATÉGIA 4: post de lançamento no Instagram com CTA direto — 'abrindo 5 vagas de gestão'","META: 5 clientes × R$5.000 = R$25.000 recorrente em 30 dias","FUNIL: li esa no quarto","6. Template: 'Caro [nome], é um prazer cuidar da sua viagem. Aproveite cada momento.'","7. Registrar no Notion e usar como prova social (com permissão)"]}]},{"id":"conciliando","nome":"Conciliando Modelos","icon":"🔗","cor":"#a78bfa","topicos":[{"id":"cn1","titulo":"5 Verdades sobre Agência + Gestão","desc":"O que entender antes de tentar conciliar os dois modelos.","itens":["1. Todo cliente de gestão é cliente da agência, mas nem todo cliente de agência é cliente de gestão","2. Não há recorrência previsível com quem viaja 1-2x por ano","3. A maioria dos clientes da sua agência NÃO são potenciais para gestão","4. 100 clientes que viajam 4-6x/ano e gastam 20k+ > 100 que viajam 1-2x","5. Quer aumentar lucro e previsibilidade? Venda gestão para os clientes certos"]},{"id":"cn2","titulo":"3 Medos que Travam o Gestor","desc":"Como superar os bloqueios mentais mais comuns.","itens":["1. 'Não posso misturar agência com gestão' → você pode. São produtos complementares","2. 'Vou estruturar a agência primeiro' → você nunca vai estar 100% pronto. Comece agora","3. 'Já tenho muito trabalho' → comece com 2-3 clientes. O operacional é separado e leve"]},{"id":"cn3","titulo":"Passo a Passo para Conciliar","desc":"Como migrar progressivamente para o modelo híbrido.","itens":["PASSO 1: fortalecer indicação dentro da agência (1 mês máximo)","PASSO 2: primeiras vendas de gestão para clientes da agência com perfil adequado","PASSO 3: filtrar urgência de emissão — A (emitir já) / B (ver valores) / C (só cotando)","PASSO 4: 100% do esforço de captação nova dedicado à gestão","PASSO 5: rico não gosta de pressão — trate com elegância e paciência"]},{"id":"cn4","titulo":"4 Regras do Perfil Instagram","desc":"Como separar os dois negócios nas redes sociais.","itens":["Regra 0: qual público você quer atender? Não o que você tem hoje — o ideal","Regra 1: NUNCA divulgue gestão no Instagram da agência","Regra 2: tenha um perfil dedicado 100% a vender gestão","Regra 3: fique 100% na fala de gestão — não misture assuntos"]},{"id":"cn5","titulo":"10 Motivos: Gestão Supera a Agência","desc":"Argumentos para clientes que só conhecem agências tradicionais.","itens":["1. Resolve burocracias: check-in, remarcações, cancelamentos","2. Cotações estratégicas e otimizadas vs genéricas","3. Hotel, seguro, upgrade, transfer conforme SUAS preferências","4. Custo fixo anual sem comissões escondidas","5. Planejamento 100% personalizado vs pacotes prontos","6. Consultoria em cartões e programas","7. Gestão inteligente de milhas","8. Promoções sob medida para o seu perfil","9. Suporte antes, durante e após","10. ROI comprovado e documentado"]},{"id":"cn6","titulo":"Regra do Lucro — R$20k/mês","desc":"Como atingir R$20k de lucro pela gestão vs agência.","itens":["AGÊNCIA: precisa de R$150k-300k de faturamento/mês para lucrar R$20k","GESTÃO: precisa de R$25k-71k de faturamento/mês para o mesmo resultado","GESTÃO + AGÊNCIA: lucro do ticket anual + comissões nas viagens sem milhas","Cálculo: 20 clientes × R$5k/ano = R$100k/ano de gestão"]}]}];

const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
const ld=(k,d)=>{try{const r=localStorage.getItem(k);return r!=null?JSON.parse(r):d;}catch{return d;}};
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2200);}

let S={auth:false,tab:'p',sel:'comece',open:{},modal:null,search:'',sidebarOpen:false,
  pilares:ld('fgm_p',null)||JSON.parse(JSON.stringify(DEF)),
  prog:ld('fgm_prog',{})};

function render(){
  const root=document.getElementById('root');
  if(!S.auth){root.innerHTML=loginHTML();setTimeout(()=>document.getElementById('pw')?.focus(),30);return;}
  root.innerHTML=appHTML();
}

function loginHTML(){return`<div class="lw"><div class="lb">
  <div class="lic">✈️</div>
  <h1 class="lt">Formação Gestor de Milhas</h1>
  <p class="ls">@formacaogestordemilhas</p>
  <div class="lc">
    <label class="ll">Senha de acesso</label>
    <input class="li" type="password" id="pw" placeholder="Digite a senha..." onkeydown="if(event.key==='Enter')login()"/>
    <div id="lerr" class="le">Senha incorreta. Tente novamente.</div>
    <button class="lb2" onclick="login()">Entrar</button>
  </div>
</div></div>`;}

function appHTML(){
  const p=S.pilares.find(x=>x.id===S.sel)||S.pilares[0];
  const totM=S.pilares.reduce((a,x)=>a+x.topicos.length,0);
  const totD=S.pilares.reduce((a,x)=>a+x.topicos.filter(t=>S.prog[x.id+'_'+t.id]).length,0);
  const done=p.topicos.filter(t=>S.prog[p.id+'_'+t.id]).length;
  const pct=p.topicos.length?Math.round(done/p.topicos.length*100):0;
  return`
    ${S.sidebarOpen?`<div class="ov on" onclick="toggleSidebar()"></div>`:''}
    <div class="app">
      <aside class="sb ${S.sidebarOpen?'open':''}">
        <div class="sbh">
          <div class="sbb">
            <div class="sbi">✈️</div>
            <div><div class="sbn">Gestor de Milhas</div><div class="sbv">v2.0 · @formacaogestordemilhas</div></div>
          </div>
          <div class="sw">
            <span class="sic">⌕</span>
            <input class="si" type="text" placeholder="Buscar módulo..." value="${esc(S.search)}" oninput="doSearch(this.value)"/>
          </div>
        </div>
        <div class="sbn2">
          <div class="nsc">Pilares</div>
          ${S.pilares.map(x=>{
            const d=x.topicos.filter(t=>S.prog[x.id+'_'+t.id]).length;
            const pt=x.topicos.length?Math.round(d/x.topicos.length*100):0;
            const isA=S.sel===x.id&&!S.search;
            return`<button class="pb ${isA?'ac':''}" onclick="sel('${x.id}')">
              <div class="pi" style="background:${x.cor}18;border:1px solid ${x.cor}28">${x.icon}</div>
              <div class="pf"><div class="pn">${x.nome}</div><div class="pc2">${x.topicos.length} módulos</div></div>
              ${pt>0?`<span class="pp" style="background:${x.cor}18;color:${x.cor};border:1px solid ${x.cor}28">${pt}%</span>`:''}
            </button>`;
          }).join('')}
        </div>
        <div class="sbf">
          <div class="sfu">
            <div style="font-size:12px;color:#9898b0;font-weight:500">${totD}/${totM} módulos</div>
            <div style="font-size:10px;color:#5c5c7a">concluídos no total</div>
          </div>
          <div class="sfbs">
            <button class="sfb" onclick="go('cfg')">Config</button>
            <button class="sfb" onclick="sair()">Sair</button>
          </div>
        </div>
      </aside>
      <main class="mn">
        <div class="tb2">
          <button class="mb2" onclick="toggleSidebar()">☰</button>
          ${S.search
            ?`<span class="tt">Resultados</span><span class="tbg">"${esc(S.search)}"</span>`
            :S.tab==='cfg'
              ?`<span class="tt">Configurações</span>`
              :`<span class="tt">${p.icon} ${p.nome}</span>
                <div class="tpw">
                  <div class="tpb"><div class="tpf" style="width:${pct}%;background:${p.cor}"></div></div>
                  <span class="tpt">${done}/${p.topicos.length}</span>
                </div>`}
        </div>
        <div class="ct">
          ${S.search?searchHTML():S.tab==='cfg'?configHTML():pilarHTML()}
        </div>
      </main>
    </div>
    ${S.modal?modalHTML():''}`;
}

function searchHTML(){
  const q=S.search.toLowerCase();
  const res=[];
  S.pilares.forEach(p=>p.topicos.forEach(t=>{
    if(t.titulo.toLowerCase().includes(q)||t.desc?.toLowerCase().includes(q)||(t.itens||[]).some(i=>i.toLowerCase().includes(q)))
      res.push({p,t});
  }));
  if(!res.length)return`<div style="text-align:center;padding:60px 20px;color:#5c5c7a"><div style="font-size:32px;margin-bottom:12px">🔍</div><div style="font-size:14px">Nenhum resultado para "${esc(S.search)}"</div></div>`;
  return`<div class="sr">
    <div class="srh">${res.length} resultado${res.length!==1?'s':''} encontrado${res.length!==1?'s':''}</div>
    ${res.map(({p,t})=>`<div class="sri" onclick="goToTopic('${p.id}','${t.id}')">
      <div class="srip">${p.icon} ${p.nome}</div>
      <div class="srit">${esc(t.titulo)}</div>
      ${t.desc?`<div class="srid">${esc(t.desc)}</div>`:''}
    </div>`).join('')}
  </div>`;}

function pilarHTML(){
  const p=S.pilares.find(x=>x.id===S.sel)||S.pilares[0];
  const done=p.topicos.filter(t=>S.prog[p.id+'_'+t.id]).length;
  const tot=p.topicos.length;
  const pct=tot?Math.round(done/tot*100):0;
  return`<div class="ph">
    <div class="pht">
      <div class="phi" style="background:${p.cor}18;border:1px solid ${p.cor}28">${p.icon}</div>
      <div class="phx"><div class="phn">${p.nome}</div><div class="phs">${tot} módulos · ${pct}% concluído</div></div>
      <div class="phst">
        <div><div class="phsn" style="color:${p.cor}">${done}</div><div class="phsl">feitos</div></div>
        <div><div class="phsn" style="color:#5c5c7a">${tot-done}</div><div class="phsl">restam</div></div>
      </div>
    </div>
    <div class="pt2"><div class="pf2" style="width:${pct}%;background:${p.cor}"></div></div>
  </div>
  ${p.topicos.map((t,i)=>topicoHTML(p,t,i)).join('')}
  <button class="atb" onclick="openModal('add','${p.id}')">+ Adicionar módulo</button>`;}

function topicoHTML(p,t,i){
  const key=p.id+'_'+t.id;
  const done=!!S.prog[key];
  const open=!!S.open[key];
  return`<div class="tc">
    <div class="tch" onclick="toggle('${key}')">
      <div class="tck ${done?'done':''}" onclick="event.stopPropagation();chk('${key}')" style="${done?`border-color:${p.cor};background:${p.cor}`:''}">${done?'✓':''}</div>
      <span class="tct" style="${done?'color:#5c5c7a;text-decoration:line-through':''}">${esc(t.titulo)}</span>
      <span class="tca ${open?'open':''}">›</span>
    </div>
    <div class="tcb ${open?'open':''}">
      ${t.desc?`<div class="tcd" style="border-left-color:${p.cor}">${esc(t.desc)}</div>`:''}
      ${(t.itens||[]).length?`<div class="tci2">${(t.itens||[]).map(it=>`<div class="tci">${esc(it)}</div>`).join('')}</div>`:''}
      <div class="tcac">
        <button class="tac" onclick="openModal('edit','${p.id}','${t.id}')">✏ Editar</button>
        <button class="tac" onclick="mv('${p.id}',${i},-1)">↑</button>
        <button class="tac" onclick="mv('${p.id}',${i},1)">↓</button>
        <button class="tac d" onclick="del('${p.id}','${t.id}')">Excluir</button>
      </div>
    </div>
  </div>`;}

function configHTML(){return`<div>
  <div class="cs">🔒 Trocar senha</div>
  <div class="cc2">
    <div class="mf2"><label>Senha atual</label><input type="password" id="op"/></div>
    <div class="mf2"><label>Nova senha</label><input type="password" id="np"/></div>
    <div class="mf2"><label>Confirmar</label><input type="password" id="cp"/></div>
    <div id="pwmsg" style="font-size:12px;min-height:16px;margin-bottom:8px"></div>
    <button class="lb2" onclick="trocaSenha()" style="margin-top:0">Alterar senha</button>
  </div>
  <div class="cs">🔄 Restaurar conteúdo</div>
  <div class="cc2">
    <p style="font-size:12px;color:#5c5c7a;margin-bottom:11px;line-height:1.6">Restaura o conteúdo original sem apagar o progresso.</p>
    ${DEF.map(p=>`<div class="cr"><span style="font-size:12px;color:#9898b0">${p.icon} ${p.nome}</span><button class="reb" onclick="rest('${p.id}')">Restaurar</button></div>`).join('')}
    <button class="reab" onclick="rest('todos')">⚠️ Restaurar tudo de uma vez</button>
  </div>
  <div class="cs">📖 Recuperar senha</div>
  <div class="cc2">
    <p style="font-size:12px;color:#5c5c7a;line-height:1.8">Chrome → F12 → Console → cole e Enter:</p>
    <code class="cb">localStorage.setItem('fgm_pw','123456')</code>
  </div>
  <div class="cs">ℹ️ Sobre</div>
  <div class="cc2">
    <div style="font-size:14px;font-weight:600;margin-bottom:5px">Formação Gestor de Milhas v2.0</div>
    <div style="font-size:12px;color:#5c5c7a;line-height:2">@formacaogestordemilhas · 11 pilares · 60+ módulos<br>Acesso protegido por senha · Dados salvos no dispositivo</div>
  </div>
</div>`;}

function modalHTML(){
  const m=S.modal;
  const p=S.pilares.find(x=>x.id===m.pid);
  const t=m.type==='edit'?p?.topicos.find(x=>x.id===m.tid):null;
  return`<div class="mo" onclick="closeModal()"><div class="mb3" onclick="event.stopPropagation()">
    <div class="mt2">${m.type==='add'?'Novo módulo':'Editar módulo'}</div>
    <div class="mf2"><label>Título</label><input type="text" id="mt" value="${t?esc(t.titulo):''}"/></div>
    <div class="mf2"><label>Descrição</label><textarea id="md">${t?esc(t.desc||''):''}</textarea></div>
    <div class="mf2"><label>Itens (um por linha)</label><textarea id="mi" style="min-height:120px">${t?(t.itens||[]).map(esc).join('\n'):''}</textarea></div>
    <div class="mbs">
      <button class="ms" onclick="salvar()">Salvar</button>
      <button class="mc" onclick="closeModal()">Cancelar</button>
    </div>
  </div></div>`;}

window.login=()=>{const pw=document.getElementById('pw')?.value;const cur=ld('fgm_pw','123456');if(pw===cur){S.auth=true;render();}else{const e=document.getElementById('lerr');if(e)e.style.display='block';}};
window.sair=()=>{S.auth=false;S.sidebarOpen=false;render();};
window.go=t=>{S.tab=t;S.modal=null;S.search='';S.sidebarOpen=false;render();};
window.sel=id=>{S.sel=id;S.tab='p';S.open={};S.modal=null;S.search='';S.sidebarOpen=false;render();};
window.toggle=key=>{S.open={...S.open,[key]:!S.open[key]};render();};
window.chk=key=>{S.prog={...S.prog,[key]:!S.prog[key]};sv('fgm_prog',S.prog);render();};
window.openModal=(type,pid,tid)=>{S.modal={type,pid,tid};render();};
window.closeModal=()=>{S.modal=null;render();};
window.toggleSidebar=()=>{S.sidebarOpen=!S.sidebarOpen;render();};
window.doSearch=q=>{S.search=q;render();};
window.goToTopic=(pid,tid)=>{S.search='';S.sel=pid;S.open={...S.open,[pid+'_'+tid]:true};S.sidebarOpen=false;render();setTimeout(()=>{document.querySelector('.tcb.open')?.scrollIntoView({behavior:'smooth',block:'center'});},100);};
window.mv=(pid,i,d)=>{S.pilares=S.pilares.map(p=>{if(p.id!==pid)return p;const ts=[...p.topicos];const ni=i+d;if(ni<0||ni>=ts.length)return p;[ts[i],ts[ni]]=[ts[ni],ts[i]];return{...p,topicos:ts};});sv('fgm_p',S.pilares);render();};
window.del=(pid,tid)=>{if(!confirm('Excluir este módulo?'))return;S.pilares=S.pilares.map(p=>p.id!==pid?p:{...p,topicos:p.topicos.filter(t=>t.id!==tid)});sv('fgm_p',S.pilares);toast('Excluído');render();};
window.salvar=()=>{const titulo=document.getElementById('mt')?.value?.trim();if(!titulo)return;const desc=document.getElementById('md')?.value?.trim()||'';const itens=(document.getElementById('mi')?.value||'').split('\n').map(s=>s.trim()).filter(Boolean);const m=S.modal;S.pilares=S.pilares.map(p=>{if(p.id!==m.pid)return p;const ts=m.type==='add'?[...p.topicos,{id:'t'+Date.now(),titulo,desc,itens}]:p.topicos.map(t=>t.id===m.tid?{...t,titulo,desc,itens}:t);return{...p,topicos:ts};});sv('fgm_p',S.pilares);S.modal=null;toast('✅ Salvo!');render();};
window.rest=id=>{if(!confirm(id==='todos'?'Restaurar TODOS os pilares?':`Restaurar "${id}"?`))return;if(id==='todos'){S.pilares=JSON.parse(JSON.stringify(DEF));}else{const orig=DEF.find(p=>p.id===id);if(!orig)return;S.pilares=S.pilares.map(p=>p.id===id?JSON.parse(JSON.stringify(orig)):p);}sv('fgm_p',S.pilares);toast('✅ Restaurado!');render();};
window.trocaSenha=()=>{const o=document.getElementById('op')?.value,n=document.getElementById('np')?.value,c=document.getElementById('cp')?.value;const cur=ld('fgm_pw','123456');const msg=document.getElementById('pwmsg');if(o!==cur){msg.textContent='❌ Senha atual incorreta.';msg.style.color='var(--red)';return;}if(n.length<4){msg.textContent='❌ Mínimo 4 caracteres.';msg.style.color='var(--red)';return;}if(n!==c){msg.textContent='❌ Senhas não coincidem.';msg.style.color='var(--red)';return;}sv('fgm_pw',n);msg.textContent='✅ Senha alterada!';msg.style.color='var(--green)';};
render();
</script>
</body>
</html>
